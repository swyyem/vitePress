name: Deploy VitePress to GitHub Pages

on:
  push:
    branches: [ main ]  # 当 main 分支有 push 时触发

jobs:
  deploy:
    runs-on: ubuntu-latest  # 使用 GitHub 提供的 Ubuntu 环境

    steps:
      - uses: actions/checkout@v4  # 拉取代码

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 使用 Node.js 20

      - name: Install dependencies
        run: npm install  # 安装依赖

      - name: Build VitePress
        run: npm run build  # 构建静态网站

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}  # GitHub 自动提供的 token
          publish_dir: .vitepress/dist  # VitePress 默认输出目录